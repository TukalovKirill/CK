services:
  backend:
    build: ./backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_NAME: ${DB_NAME:-ck_db}
      DB_USER: ${DB_USER:-kirill}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*,147.45.150.208}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://147.45.150.208:8082}
    volumes:
      - backend_media:/app/media

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ck-front.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ck-front.entrypoints=ck"
      - "traefik.http.services.ck-front.loadbalancer.server.port=80"
    networks:
      - proxy
      - default

networks:
  proxy:
    external: true

volumes:
  backend_media:
